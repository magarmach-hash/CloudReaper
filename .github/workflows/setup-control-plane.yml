name: "CloudReaper — Setup Control Plane"

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'yes' to confirm you want to deploy the control plane"
        required: true

jobs:
  deploy-control-plane:
    name: Deploy Control Plane
    runs-on: ubuntu-latest
    if: inputs.confirm == 'yes'

    defaults:
      run:
        working-directory: control-plane

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'ap-south-1' }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve
        env:
          TF_VAR_github_owner: ${{ github.repository_owner }}
          TF_VAR_github_repo: ${{ github.event.repository.name }}
          TF_VAR_github_secret_arn: ${{ vars.CLOUDREAPER_SECRET_ARN }}
          TF_VAR_aws_region: ${{ vars.AWS_REGION || 'ap-south-1' }}
